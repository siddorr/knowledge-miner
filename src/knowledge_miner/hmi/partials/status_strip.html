<section id="topStatusStrip" class="status-strip" aria-label="Global status">
  <strong id="statusProjectName">UPW Knowledge Miner</strong>
  <strong>Pending Tasks</strong>
  <button id="taskReviewBtn" type="button">Review Sources: <span id="statusPendingReview">0</span></button>
  <button id="taskDocumentsBtn" type="button">Documents Queue: <span id="statusAwaitingDocs">0</span></button>
  <button id="taskErrorsBtn" type="button">Resolve Errors: <span id="statusDocFailures">0</span></button>
  <span>Session: <span id="statusActiveTopic">Default Session</span></span>
  <span>Recent activity: <span id="statusLastRun">none</span></span>
  <button id="statusNextActionBtn" type="button">Next Action</button>
  <form id="quickKeywordForm" class="row compact">
    <label>
      Search New Keywords
      <input id="quickKeywordInput" type="text" placeholder="upw membrane fouling, semiconductor rinsing">
    </label>
    <button id="quickKeywordSearchBtn" type="submit">Search New Keywords</button>
  </form>
</section>

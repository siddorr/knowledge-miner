<section id="topStatusStrip" class="status-strip" aria-label="Global session status">
  <strong id="statusProjectName">UPW Knowledge Miner</strong>
  <span>Active Session: <strong id="statusActiveSession">Default Session</strong></span>
  <span>Pending review: <strong id="statusPendingReview">0</strong></span>
  <span>Awaiting documents: <strong id="statusAwaitingDocs">0</strong></span>
  <span>Document failures: <strong id="statusDocFailures">0</strong></span>
  <span>Active discovery run: <code id="statusActiveDiscoveryRun">-</code></span>
  <span>Recent activity: <span id="statusLastRun">none</span></span>
  <button id="statusNextActionBtn" type="button">Next: build</button>
  <form id="quickKeywordForm" class="row compact">
    <label>
      Search new keywords
      <input id="quickKeywordInput" type="text" placeholder="upw membrane fouling, semiconductor rinsing">
    </label>
    <button id="quickKeywordSearchBtn" type="submit">Search</button>
  </form>
</section>

<section id="library" class="panel">
  <h2>Library Export</h2>
  <p class="muted">Ranked export workspace for final paper package generation.</p>
  <div class="row compact summary-row">
    <span>Matching papers: <strong id="librarySummaryMatches">0</strong></span>
    <span>Highest AI relevance: <strong id="librarySummaryHighest">-</strong></span>
    <span>Lowest AI relevance: <strong id="librarySummaryLowest">-</strong></span>
  </div>
  <form id="searchForm" class="row">
    <label>
      Query
      <input id="searchQuery" type="text" placeholder="UPW membrane">
      <button type="button" class="copy-value-btn" data-target-id="searchQuery" data-feedback-id="searchState">Copy</button>
    </label>
    <label>
      Limit
      <select id="searchLimit">
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </label>
    <button id="searchRunBtn" type="submit">Load Ranked Results</button>
  </form>
  <form id="libraryFilterForm" class="row">
    <label>
      Session Contains
      <input id="libraryTopicFilter" type="text" placeholder="keyword">
    </label>
    <label>
      Year
      <input id="libraryYearFilter" type="number" min="1900" max="2100" placeholder="2024">
    </label>
    <label>
      Docs
      <select id="libraryDocsFilter">
        <option value="all" selected>All</option>
        <option value="available">Available</option>
        <option value="errors">Errors</option>
      </select>
    </label>
    <label>
      Parsed Decision
      <select id="libraryParsedFilter">
        <option value="all" selected>All</option>
        <option value="accept">Accept</option>
        <option value="reject">Reject</option>
        <option value="review">Review</option>
        <option value="unset">Unset</option>
      </select>
    </label>
    <button type="submit">Apply Filters</button>
  </form>
  <div class="row compact">
    <label>
      Export size
      <select id="libraryExportSize">
        <option value="20" selected>Top 20</option>
        <option value="50">Top 50</option>
        <option value="100">Top 100</option>
      </select>
    </label>
    <button id="libraryExportZipBtn" type="button">Export ZIP with PDFs</button>
    <button id="libraryExportCsvBtn" type="button">Export Metadata CSV</button>
    <button id="libraryIncludeSelectedBtn" type="button">Add to export list</button>
    <button id="libraryExcludeSelectedBtn" type="button">Remove from export list</button>
  </div>
  <section class="library-layout">
    <section class="panel-sub">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Select</th><th>Rank</th><th>AI Score</th><th>Year</th><th>Citations</th><th>Title</th></tr></thead>
          <tbody id="searchRows"></tbody>
        </table>
      </div>
      <p id="searchState" class="muted"></p>
    </section>
    <section id="libraryDetailPanel" class="panel-sub">
      <h3>Paper Details</h3>
      <pre id="searchPreview" class="metrics">No document selected.</pre>
      <div class="row compact">
        <button id="libraryDetailAddBtn" type="button">Add to export list</button>
        <button id="libraryDetailRemoveBtn" type="button">Remove from export list</button>
      </div>
    </section>
  </section>
  <div class="row compact">
    <button type="button" class="copy-value-btn" data-target-id="searchError" data-feedback-id="searchState">Copy Error</button>
  </div>
  <p id="searchError" class="error"></p>
</section>

<section id="controlsRow" class="controls-row" aria-label="Session controls">
  <button id="topNewSessionBtn" type="button">New Session</button>
  <button id="topSaveSessionBtn" type="button">Save</button>
  <button id="topLoadSessionBtn" type="button">Load</button>
  <button id="topDeleteSessionBtn" type="button">Delete</button>
  <label for="sessionHistorySelect" class="controls-history">
    History
    <select id="sessionHistorySelect"></select>
  </label>
  <span id="sessionState" class="muted">No saved sessions.</span>
</section>
